services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: vivadeo
      POSTGRES_USER: vivadeo
      POSTGRES_PASSWORD: vivadeo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vivadeo -d vivadeo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${VIVADEO_API_IMAGE:-ghcr.io/jimamuto/vivadeo-api:latest}
    command: sh -c "alembic upgrade head && uvicorn vivadeo.api:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://vivadeo:vivadeo@postgres:5432/vivadeo
      REDIS_URL: redis://redis:6379/0
      VIVADEO_INTERNAL_SERVICE_KEY: ${VIVADEO_INTERNAL_SERVICE_KEY:-change-me}
      VIVADEO_DEFAULT_ORG_ID: ${VIVADEO_DEFAULT_ORG_ID:-default-workspace}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:3000/api/proxy/v1/media
      S3_BUCKET: vivadeo
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./vivadeo:/app/vivadeo
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
      - ./media:/media:ro
      - ${HOME}/.modal.toml:/root/.modal.toml:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: ${VIVADEO_API_IMAGE:-ghcr.io/jimamuto/vivadeo-api:latest}
    command: sh -c "alembic upgrade head && celery -A vivadeo.worker.celery_app worker --loglevel=INFO"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://vivadeo:vivadeo@postgres:5432/vivadeo
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:3000/api/proxy/v1/media
      S3_BUCKET: vivadeo
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./vivadeo:/app/vivadeo
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
      - ./media:/media:ro
      - ${HOME}/.modal.toml:/root/.modal.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    image: ${VIVADEO_WEB_IMAGE:-ghcr.io/jimamuto/vivadeo-web:latest}
    command: npm run dev
    env_file: .env
    environment:
      API_INTERNAL_URL: http://api:8000
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgres://vivadeo:vivadeo@postgres:5432/vivadeo}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-vivadeo-better-auth-secret-change-before-production}
      MINIO_INTERNAL_URL: http://minio:9000
      VIVADEO_INTERNAL_SERVICE_KEY: ${VIVADEO_INTERNAL_SERVICE_KEY:-change-me}
      VIVADEO_DEFAULT_ORG_ID: ${VIVADEO_DEFAULT_ORG_ID:-default-workspace}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      EMAIL_FROM: ${EMAIL_FROM:-Vivadeo <no-reply@example.com>}
      RESEND_API_KEY: ${RESEND_API_KEY:-change-me-resend}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
  web_next:
